<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi POS">
<link rel="apple-touch-icon" href="/precios-tienda/icons/icon-192.png">
<title>Mi Punto de Venta</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Mi Punto de Venta</h1>
    <div class="hdr-right">
      <span class="db-badge" id="db-badge" title="Base de datos">&#9679;</span>
      <span class="hdr-count" id="hdr-count">0</span>
      <span class="hdr-clock" id="hdr-clock"></span>
    </div>
  </header>

  <div id="search-wrap">
    <div style="position:relative">
      <div id="search-row">
        <input id="search-input" type="text" placeholder="Buscar producto, Enter para agregar..." autocomplete="off" autocapitalize="none" inputmode="search">
        <button id="search-btn" aria-label="Agregar">+</button>
      </div>
      <div id="suggestions"></div>
    </div>
  </div>

  <div id="cart-wrap">
    <div id="cart-empty">
      <div class="icon">🛒</div>
      <p>Escribe el nombre del producto y presiona <strong>Enter</strong></p>
      <p class="sub">Si no existe en la base de datos, lo crea autom&aacute;ticamente</p>
    </div>
    <div id="cart-list"></div>
  </div>

  <div id="botbar">
    <div class="bb-total">
      <div class="bb-label">Total</div>
      <div class="bb-amount" id="bb-amount">$0.00</div>
    </div>
    <div class="bb-actions">
      <button id="btn-history" class="bb-btn" title="Historial">📋</button>
      <button id="btn-products" class="bb-btn" title="Productos">📦</button>
      <button id="btn-checkout" disabled>Cobrar</button>
    </div>
  </div>
</div>

<div id="quick-price">
  <div class="qp-box">
    <h2>Nuevo producto</h2>
    <div class="qp-name" id="qp-name"></div>
    <input id="qp-input" type="number" step="0.01" min="0" placeholder="Precio" inputmode="decimal">
    <div class="qp-actions">
      <button class="btn-cancel" id="qp-cancel">Cancelar</button>
      <button class="btn-add" id="qp-add">Agregar</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>
<div id="offline-banner">Sin conexi&oacute;n — los datos se sincronizar&aacute;n autom&aacute;ticamente</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
