<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Precios Tienda">
  <link rel="apple-touch-icon" href="/precios-tienda/icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Precios Tienda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <h1>Precios Tienda</h1>
      <button id="sync-status" class="sync-btn" title="Estado de conexión">&#9679;</button>
    </header>

    <!-- Products View -->
    <section id="view-products" class="view active">
      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar producto..." autocomplete="off">
        <button id="clear-search" class="btn-icon" hidden>&#10005;</button>
      </div>

      <!-- Business Filters -->
      <div id="business-filters" class="category-chips">
        <button class="chip active" data-business="all">Todos</button>
        <button class="chip" data-business="abarrotes">Abarrotes</button>
        <button class="chip" data-business="papeleria">Papelería</button>
        <button class="chip" data-business="conasupo">Conasupo</button>
        <button class="chip" data-business="refaccionaria">Refaccionaria</button>
      </div>

      <!-- Product List -->
      <div id="product-list" class="product-list">
        <div class="empty-state" id="empty-products">
          <p>No hay productos aún</p>
          <p class="sub">Toca + para agregar tu primer producto</p>
        </div>
      </div>

      <!-- FAB -->
      <button id="fab-add" class="fab">+</button>
    </section>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Producto</h2>
        <button id="modal-close" class="btn-icon">&#10005;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="product-id">
        <div class="form-group">
          <label for="product-name">Nombre del producto</label>
          <input type="text" id="product-name" required placeholder="Ej: Leche Entera">
        </div>
        <div class="form-group">
          <label for="product-size">Tamaño / Presentación <span style="font-weight:400;color:#919baa">(opcional)</span></label>
          <input type="text" id="product-size" placeholder="Ej: 600ml, 1.5L, 500g, pieza">
        </div>
        <div class="form-group">
          <label for="product-price">Precio ($)</label>
          <input type="number" id="product-price" step="0.01" min="0" required placeholder="0.00">
        </div>
        <div class="form-group">
          <label for="product-business">Negocio (POS)</label>
          <select id="product-business" required>
            <option value="">Seleccionar negocio</option>
            <option value="abarrotes">Abarrotes</option>
            <option value="papeleria">Papelería</option>
            <option value="conasupo">Conasupo</option>
            <option value="refaccionaria">Refaccionaria</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-delete-product" class="btn-danger hidden">Eliminar</button>
          <div class="modal-actions-right">
            <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
            <button type="submit" id="btn-save" class="btn-primary">Guardar</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=2"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
